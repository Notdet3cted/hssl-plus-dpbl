# FASE 0 - Configuration Management
project:
  seed: 42
  name: "WESAD_HSSL_DPBL"

paths:
  # raw_data: "data/raw/"
  raw_data: "/kaggle/input/datasets/orvile/wesad-wearable-stress-affect-detection-dataset"
  processed_data: "data/processed/"
  normalized_data: "data/normalized/"
  windowed: "data/windowed/"
  checkpoints: "checkpoints/"
  embeddings: "embeddings/"
  embeddings_hssl: "embeddings/hssl/"
  embeddings_ssl: "embeddings/ssl/"
  embeddings_hssl_dpbl: "embeddings/hssl_dpbl/"
  embeddings_ssl_dpbl: "embeddings/ssl_dpbl/"
  logs: "logs/"
  reports: "reports/"
  results: "results/"
  results_predictions: "results/predictions/"
  experiments: "experiments/"
  dashboard: "dashboard/"

preprocessing:
  window_size: 700
  overlap: 0.5
  target_fps: 35
  channels: ["EDA", "BVP"]

training:
  batch_size: 128
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001

ssl_pretraining:
  epochs: 50
  batch_size: 128
  learning_rate: 0.05
  momentum: 0.9
  weight_decay: 0.0001

dpbl:
  hidden_dim: 128
  n_calibration_windows: 30

evaluation:
  metrics: ["accuracy", "precision", "recall", "f1_score", "roc_auc", "pr_auc"]
  export_fold_results: true
  export_model_summary: true
  validate_completeness: true
  reevaluate_from_predictions: false

models:
  include_ablation:
    rf: true
    cnn: true
    ssl: true
    hssl: true
    ssl_dpbl: true
    hssl_dpbl: true
  cnn:
    channels: [64, 128, 256]
    kernels: [7, 5, 3]
    dropout: 0.4
  rf:
    n_estimators: 200
    class_weight: "balanced"
  embedding_classifier:
    hidden_dim: 128
    dropout: 0.4
    learning_rate: 0.001
