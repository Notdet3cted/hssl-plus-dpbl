# FASE 0 - Configuration Management
project:
  seed: 42
  name: "WESAD_HSSL_DPBL"

paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  normalized_data: "/content/drive/MyDrive/hssl_dpbl_data/normalized/"
  windowed: "/content/drive/MyDrive/hssl_dpbl_data/windowed/"
  checkpoints: "/content/drive/MyDrive/hssl_dpbl_checkpoints/"
  embeddings: "/content/drive/MyDrive/hssl_dpbl_data/embeddings/"
  embeddings_hssl: "/content/drive/MyDrive/hssl_dpbl_data/embeddings/hssl/"
  embeddings_ssl: "/content/drive/MyDrive/hssl_dpbl_data/embeddings/ssl/"
  embeddings_hssl_dpbl: "/content/drive/MyDrive/hssl_dpbl_data/embeddings/hssl_dpbl/"
  embeddings_ssl_dpbl: "/content/drive/MyDrive/hssl_dpbl_data/embeddings/ssl_dpbl/"
  logs: "logs/"
  reports: "/content/drive/MyDrive/hssl_dpbl_reports/"
  results: "/content/drive/MyDrive/hssl_dpbl_results/"
  results_predictions: "/content/drive/MyDrive/hssl_dpbl_results/predictions/"
  experiments: "experiments/"
  dashboard: "/content/drive/MyDrive/hssl_dpbl_results/"

preprocessing:
  window_size: 700
  overlap: 0.5
  target_fps: 700
  channels: ["EDA", "BVP"]
  # Band‑pass filter parameters
  filter:
    low_cut: 0.3
    high_cut: 45.0
    order: 4
  # Augmentation parameters
  augmentation:
    noise_level: 0.05
    scale_factor: 0.1

training:
  batch_size: 128
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001

ssl_pretraining:
  epochs: 50
  batch_size: 128
  learning_rate: 0.05
  momentum: 0.9
  weight_decay: 0.0001

dpbl:
  hidden_dim: 128
  n_calibration: 30

# Robustness testing models
robustness:
  models: ["rf","cnn","ssl","hssl","ssl+dpbl","hssl+dpbl"]

evaluation:
  metrics: ["accuracy", "precision", "recall", "f1_score", "roc_auc", "pr_auc"]
  export_fold_results: true
  export_model_summary: true
  validate_completeness: true
  reevaluate_from_predictions: false

models:
  include_ablation:
    rf: true
    cnn: true
    ssl: true
    hssl: true
    ssl_dpbl: true
    hssl_dpbl: true
  cnn:
    channels: [64, 128, 256]
    kernels: [7, 5, 3]
    dropout: 0.4
  rf:
    n_estimators: 200
    class_weight: "balanced"
  embedding_classifier:
    hidden_dim: 128
    dropout: 0.4
    learning_rate: 0.001